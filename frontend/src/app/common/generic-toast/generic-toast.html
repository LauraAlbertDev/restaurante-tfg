@if (ui.toastMessage()) {
  <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100;">
    <div class="toast align-items-center text-white border-0 show shadow-lg animate-fade-in"
         [class.bg-success]="ui.toastType() === 'success'"
         [class.bg-danger]="ui.toastType() === 'danger'"
         role="alert"
         aria-live="assertive"
         aria-atomic="true">
      <div class="d-flex justify-content-between align-items-center pr-2">
        <div class="toast-body d-flex align-items-center gap-2 py-3">
          <i class="bi fs-5"
             [class.bi-check-circle-fill]="ui.toastType() === 'success'"
             [class.bi-exclamation-triangle-fill]="ui.toastType() === 'danger'">
          </i>
          <span>{{ ui.toastMessage() }}</span>
        </div>
        <button type="button"
                class="btn-close btn-close-white me-3"
                (click)="ui.clearToast()"
                aria-label="Close">
        </button>
      </div>
    </div>
  </div>
}
