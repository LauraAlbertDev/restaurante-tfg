<div class="map-container">
  <header class="d-flex justify-content-between align-items-center px-4 py-3 bg-white shadow-sm z-3">
    <div class="d-flex align-items-center gap-4">
      <input type="date"
             [value]="selectedDate()"
             [min]="minDate()"
             [max]="maxDate()"
             (change)="onDateChange($event)"
             class="form-control form-control-sm">
      <span class="badge rounded-pill text-uppercase px-3 py-2 fw-bold"
            [ngClass]="isLocked() ?
        'bg-primary-subtle text-primary border border-primary-subtle' :
        'bg-warning-subtle text-warning-emphasis border border-warning-subtle'">

  <i class="bi me-1" [class.bi-lock-fill]="isLocked()" [class.bi-unlock-fill]="!isLocked()"></i>
        {{ isLocked() ? 'Modo Operativos' : 'Modo Edición' }}
</span>
    </div>

    <div class="d-flex align-items-center gap-2">
      @if (auth.isLeaderOrAdmin()) {
        @if (!isLocked()) {
          @for (tool of editTools; track tool.title) {
            <button
              [class]="'btn ' + tool.class"
              (click)="tool.action()"
              [attr.title]="tool.title">
              <i [class]="'bi ' + tool.icon"></i>
            </button>
          }
        }
        <div class="divider w-1"></div>
        @if (!isLocked()) {
          <button class="btn btn-warning" (click)="saveAsTemplate()">
            <i class="bi bi-star-fill me-1"></i> Guardar como Plantilla
          </button>
          <button class="btn btn-primary" (click)="saveFloorPlan()">
            <i class="bi bi-calendar-check me-1"></i> Guardar para este Día
          </button>
        } @else {
          <a class="btn btn-info text-white shadow-sm"
             routerLink="/auth/orders-list"
             title="Ver todas las órdenes activas">
            <i class="bi bi-clipboard-check-fill me-1"></i> Órdenes Activas
          </a>
        }
        <button class="btn shadow-sm btn-outline-secondary"
                [class.btn-outline-success]="isLocked()"
                [class.btn-outline-danger]="!isLocked()"
                (click)="toggleMapLock()">
          <i class="bi me-2" [class.bi-lock-fill]="isLocked()" [class.bi-unlock-fill]="!isLocked()"></i>
          {{ isLocked() ? 'Desbloquear Mapa' : 'Bloquear Mapa' }}
        </button>
      }
    </div>
  </header>

  <main class="canvas-wrapper d-flex justify-content-center align-items-center bg-light border overflow-hidden w-100" #container>
    <canvas id="canvasMesas"></canvas>
  </main>
  <footer class="bg-white border-top px-4 py-3 d-flex flex-wrap justify-content-center align-items-center gap-4 shadow-sm">
    @for (item of legendItems; track item.text) {
      <div class="d-flex align-items-center gap-2">
        <span
          class="border rounded-circle"
          [ngStyle]="{ 'background-color': item.color, 'border-color': item.color }"
          style="width: 16px; height: 16px; display: inline-block;">
        </span>
        <span class="small fw-semibold text-secondary">{{ item.text }}</span>
      </div>
    }
  </footer>
</div>
