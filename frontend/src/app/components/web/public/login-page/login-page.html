<div class="container mt-5 mb-5" style="max-width:400px">

  <div class="text-center mb-4">
    <img src="assets/images/logo.png" alt="Restaurante Logo" class="img-fluid" width="150">
  </div>

  <h3 class="mb-4 text-center fw-bold text-uppercase">Iniciar Sesión</h3>

  @if (errorMessage) {
    <div class="alert alert-danger small py-2 animate__animated animate__shakeX">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      {{ errorMessage }}
    </div>
  }

  <div class="mb-3">
    <label class="form-label small fw-bold text-muted">Email</label>
    <input type="email"
           class="form-control shadow-sm"
           placeholder="ejemplo@empresa.com"
           [(ngModel)]="email"
           (keyup.enter)="login()">
  </div>

  <div class="mb-4">
    <label class="form-label small fw-bold text-muted">Contraseña</label>
    <input type="password"
           class="form-control shadow-sm"
           placeholder="••••••••"
           [(ngModel)]="password"
           (keyup.enter)="login()">
  </div>

  <div class="text-center">
    <button class="btn btn-dark w-100 py-2 fw-bold shadow-sm"
            (click)="login()"
            [disabled]="isLoading">

      @if (isLoading) {
        <span class="spinner-border spinner-border-sm me-2" role="status"></span>
        ENTRANDO...
      } @else {
        <i class="bi bi-box-arrow-in-right me-2"></i>
        ENTRAR
      }
    </button>
  </div>

</div>
