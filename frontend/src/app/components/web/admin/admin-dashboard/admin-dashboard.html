<div class="container-fluid py-5 bg-transparent">
  <header class="text-center mb-5">
    <h1 class="display-4 fw-bold text-white">Panel de <span class="text-primary">Control</span></h1>
    <p class="lead text-white-50">Gestión integral del establecimiento</p>
    <hr class="mx-auto border-primary border-3 opacity-75" style="width: 60px;">
  </header>

  <div class="container">
    <div class="row g-4 justify-content-center">
      @for(module of modules; track $index){
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card h-100 shadow border-top border-4 rounded-3 hover-card bg-transparent border-secondary border-opacity-25"
             [class.border-primary]="module.colorClass === 'primary'"
             [class.border-success]="module.colorClass === 'success'"
             [class.border-info]="module.colorClass === 'info'">

          <div class="card-body p-4">
            <div class="d-flex align-items-center mb-4">
              <div class="p-3 rounded-3 me-3"
                   [ngClass]="'bg-' + module.colorClass + ' bg-opacity-10 text-' + module.colorClass">
                <span class="fs-3">{{ module.icon }}</span>
              </div>
              <h2 class="h4 fw-bold m-0 text-white">{{ module.title }}</h2>
            </div>

            <div class="d-grid gap-3 list-group list-group-flush">
              @for (link of module.links; track $index){

              <a [routerLink]="link.url"
                 class="list-group-item list-group-item-action p-3 rounded-3 bg-transparent text-white-50 border-0 hover-btn">
                <div class="fw-bold text-white">{{ link.label }}</div>
                <div class="small">{{ link.description }}</div>
              </a>
              }
            </div>
          </div>
        </div>
      </div>
      }
    </div>
  </div>
</div>
