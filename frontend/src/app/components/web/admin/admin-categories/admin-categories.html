<div class="container py-4">
  <h3 class="text-center mb-4">⚙️ Panel de Categorías</h3>

  <div class="row justify-content-center mb-4">
    <div class="col-md-6 d-flex gap-2">
      <input type="text"
             class="form-control"
             placeholder="Ej: Postres, Bebidas..."
             [ngModel]="newName()"
             (ngModelChange)="newName.set($event)"
             (keyup.enter)="create()"
             [disabled]="loading()"> <button class="btn btn-dark"
                                              (click)="create()"
                                              [disabled]="!newName() || loading()">
      {{ loading() ? '...' : 'Añadir' }}
    </button>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-6">
      @if (categories().length === 0 && !loading()) {
        <p class="text-muted text-center">No hay categorías registradas.</p>
      }

      @for (cat of categories(); track cat.id) {
        <div class="border rounded p-3 mb-2 shadow-sm bg-white">

          @if (editId() === cat.id) {
            <div class="d-flex gap-2 animate__animated animate__fadeIn">
              <input class="form-control"
                     [ngModel]="editText()"
                     (ngModelChange)="editText.set($event)"
                     (keyup.enter)="saveEdit(cat.id)"
                     [disabled]="loading()"
                     autoFocus>

              <button class="btn btn-success btn-sm" (click)="saveEdit(cat.id)" [disabled]="loading()">
                <i class="bi bi-check-lg"></i>
              </button>

              <button class="btn btn-secondary btn-sm" (click)="cancelEdit()" [disabled]="loading()">
                <i class="bi bi-x-lg"></i>
              </button>
            </div>
          } @else {
            <div class="d-flex justify-content-between align-items-center">
              <span class="fw-bold text-secondary">{{ cat.name }}</span>
              <div class="d-flex gap-2">

                <button class="btn btn-sm btn-outline-primary border-0"
                        (click)="startEdit(cat)"
                        [disabled]="loading()"
                        title="Editar">
                  <i class="bi bi-pencil-square"></i>
                </button>

                <button class="btn btn-sm btn-outline-danger border-0"
                        (click)="delete(cat.id)"
                        [disabled]="loading()"
                        title="Eliminar">
                  <i class="bi bi-trash3"></i>
                </button>
              </div>
            </div>
          }
        </div>
      }
    </div>
  </div>
</div>
