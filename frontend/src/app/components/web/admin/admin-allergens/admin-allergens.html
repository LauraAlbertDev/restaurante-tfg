<app-admin-list-manager
  title="Alérgenos"
  [showColor]="true"
  [items]="items()"
  [loading]="loading()"
  [editId]="editId()"
  [newName]="newName()"
  [newColor]="newColor()"
  [editText]="editText()"
  [editColor]="editColor()"

  (newNameChange)="newName.set($event)"
  (newColorChange)="newColor.set($event)"
  (editTextChange)="editText.set($event)"
  (editColorChange)="editColor.set($event)"

  (onCreate)="create()"
  (onDelete)="delete($event)"
  (onStartEdit)="startEdit($event)"
  (onSaveEdit)="saveEdit($event)"
  (onCancelEdit)="cancelEdit()">
</app-admin-list-manager>
