<div class="container mt-4">
  <!-- Cabecera -->
  <div class="d-flex justify-content-between mb-4 align-items-end">
    <div>
      <h3 class="fw-bold mb-1">Panel de Gestión</h3>
      <p class="text-secondary small mb-0">Administración dinámica de registros</p>
    </div>

    <button class="btn btn-primary rounded-3 px-4 py-2 shadow-sm d-flex align-items-center"
            data-bs-toggle="modal"
            data-bs-target="#addUserModal"
            (click)="openAddModal()">
      <i class="bi bi-plus-circle-fill me-2"></i> Nuevo Registro
    </button>
  </div>

  <app-generic-table
    [data]="filteredData()"
    [columns]="columns"
    [actionTemplate]="userActions">
  </app-generic-table>

  <ng-template #userActions let-user>
    <button class="btn btn-outline-primary btn-sm rounded-3" (click)="openEditModal(user)" data-bs-toggle="modal" data-bs-target="#addUserModal">
      <i class="bi bi-pencil"></i>
    </button>
    <button class="btn btn-outline-danger btn-sm rounded-3" (click)="onArchive(user.id)">
      <i class="bi bi-archive"></i>
    </button>
  </ng-template>

  <!-- Modal Único (Corregido) -->
  <div class="modal fade" id="addUserModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-white border-secondary">
        <div class="modal-header border-secondary">
          <h4 class="text-warning fw-bold mb-0">
            <i class="bi" [ngClass]="isEditing() ? 'bi-pencil-fill' : 'bi-people-fill'"></i>
            {{ isEditing() ? ' Editar Registro' : ' Nuevo Registro' }}
          </h4>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <form [formGroup]="formUsers" (ngSubmit)="onSubmit()">
            <div class="row g-3">
              <div class="col-md-6">
                <div class="form-floating text-dark">
                  <input type="text" class="form-control" id="name" placeholder="Nombre" formControlName="name"
                         [class.is-invalid]="u['name']?.touched && u['name']?.invalid">
                  <label for="name">Nombre</label>
                </div>
              </div>

              <div class="col-md-6">
                <div class="form-floating text-dark">
                  <input type="password" class="form-control" id="password" placeholder="Contraseña" formControlName="password"
                         [class.is-invalid]="u['password']?.touched && u['password']?.invalid">
                  <label for="password">Contraseña</label>
                </div>
              </div>

              <div class="col-md-6">
                <div class="form-floating text-dark">
                  <select class="form-select" id="type" formControlName="type">
                    <option value="employee">Empleado</option>
                    <option value="leader">Leader</option>
                    <option value="admin">Administrador</option>
                  </select>
                  <label for="type">Tipo</label>
                </div>
              </div>

              <div class="col-md-6">
                <div class="form-floating text-dark">
                  <input type="email" class="form-control" id="email" placeholder="Email" formControlName="email"
                         [class.is-invalid]="u['email']?.touched && u['email']?.invalid">
                  <label for="email">Email</label>
                </div>
              </div>
            </div>

            <div class="modal-footer border-0 px-0 pb-0 mt-4">
              <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-warning fw-bold px-4" [disabled]="formUsers.invalid" data-bs-dismiss="modal">
                {{ isEditing() ? 'Actualizar' : 'Crear' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
