<div class="container py-4">
  <div class="card shadow-sm border-0 p-4">

    <div class="d-flex flex-column flex-xl-row justify-content-between align-items-center mb-4 gap-3">

      <div class="d-flex align-items-center gap-3">
        <h2 class="h4 fw-bold mb-0 text-uppercase">Panel de Reservas</h2>
        <a [routerLink]="['/reservas']"
           class="btn btn-dark btn-sm rounded-pill px-3 shadow-sm">
          <i class="bi bi-plus-lg me-1"></i> NUEVA RESERVA
        </a>
      </div>

      <div class="d-flex flex-wrap align-items-center gap-3 bg-light p-2 rounded-3 border">
        <div class="d-flex align-items-center gap-2">
          <label class="small fw-bold text-muted text-uppercase">Desde:</label>
          <input type="date"
                 class="form-control form-control-sm shadow-none border-2 "
                 [ngModel]="startDate()"
                 (ngModelChange)="startDate.set($event)">
        </div>

        <div class="d-flex align-items-center gap-2">
          <label class="small fw-bold text-muted text-uppercase">Hasta:</label>
          <input type="date"
                 class="form-control form-control-sm shadow-none border-2"
                 [ngModel]="endDate()"
                 (ngModelChange)="endDate.set($event)">
        </div>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light text-uppercase small fw-bold">
        <tr>
          <th>Cliente / Teléfono</th>
          <th>Fecha</th>
          <th>Hora</th>
          <th>Pax</th>
          <th class="text-end">Acciones</th>
        </tr>
        </thead>
        <tbody>
          @for (res of filteredReservations(); track res.id) {
            <tr>
              <td>
                <div class="fw-bold">{{ res.name }}</div>
                <div class="text-muted small">{{ res.phone }}</div>
              </td>
              <td>{{ formatDate(res.date) }}</td>
              <td><span class="badge bg-dark">{{ res.hour }}</span></td>
              <td><strong>{{ res.n_people }}</strong></td>
              <td class="text-end">
                <div class="d-flex justify-content-end gap-2">
                  <a class="btn btn-sm btn-outline-primary border-0"
                     [routerLink]="['/auth/reservations-edit/', res.id]">
                    <i class="bi bi-pencil-square"></i>
                  </a>

                  <button class="btn btn-sm btn-outline-danger border-0"
                          (click)="deleteReservation(res.id)">
                    <i class="bi bi-trash3-fill"></i>
                  </button>
                </div>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="5" class="text-center py-5 text-muted">
                <i class="bi bi-calendar-x fs-2 d-block mb-2"></i>
                No hay reservas para este rango de fechas.
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
