<div class="container py-4">
  <div class="card shadow-sm border-0 p-4">

    <div class="d-flex flex-column flex-xl-row justify-content-between align-items-center mb-4 gap-3">
        <h2 class="h4 fw-bold mb-0 text-uppercase">Panel de Reservas</h2>
        @let isAdmin = auth.isLeaderOrAdmin();
        <a [routerLink]="[isAdmin ? '/reservas' : '/auth/mesas']" class="btn btn-dark btn-sm rounded-pill px-3 shadow-sm">
          <i class="bi me-1" [ngClass]="isAdmin ? 'bi-plus-lg' : 'bi-eye'"></i>
          {{ isAdmin ? 'NUEVA RESERVA' : 'MESAS' }}
        </a>

      <div class="d-flex flex-wrap align-items-center gap-3 bg-light p-2 rounded-3 border">
        @for (f of dateFilters; track f.label) {
          <div class="d-flex align-items-center gap-2">
            <label class="small fw-bold text-muted text-uppercase">{{ f.label }}:</label>
            <input type="date" class="form-control form-control-sm"
                   [ngModel]="f.signal()" (ngModelChange)="f.signal.set($event)">
          </div>
        }
        <div class="d-flex gap-2 align-items-center">
          <label class="small fw-bold text-muted text-uppercase">Estado:</label>
          <select (change)="onStatusFilterChange($event)" class="form-select form-select-sm shadow-none border-2">
            @for (opt of FILTER_OPTIONS; track opt.value) {
              <option [value]="opt.value" [selected]="statusFilter().join(',') === opt.value">
                {{ opt.label }}
              </option>
            }
          </select>
        </div>
      </div>

    </div>

    <app-generic-table
      [data]="filteredReservations()"
      [columns]="reservationsColumns"
      [actionTemplate]="reservaActions"
      [rowClassFunc]="getRowClass">
    </app-generic-table>

    <ng-template #reservaActions let-res>
      <div class="d-flex justify-content-end gap-2">
        <a class="btn btn-sm btn-outline-primary border-0"
           [routerLink]="['/auth/reservations-detail/', res.id]">
          <i class="bi bi-eye"></i>
        </a>

        @if (auth.isLeaderOrAdmin()) {
          <a class="btn btn-sm btn-outline-primary border-0"
             [routerLink]="['/leader/reservations-edit/', res.id]">
            <i class="bi bi-pencil-square"></i>
          </a>
          <button class="btn btn-sm btn-outline-danger border-0"
                  (click)="deleteReservation(res.id)">
            <i class="bi bi-trash3-fill"></i>
          </button>
        }
      </div>
    </ng-template>

  </div>
</div>
