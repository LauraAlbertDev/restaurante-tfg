  <div class="card shadow-sm p-3 sticky-top">
    <h6 class="fw-bold mb-3 border-bottom pb-2 text-dark">Filtros</h6>
    <div class="mb-3">
      <input class="form-control" placeholder="🔎 Buscar..." [(ngModel)]="search">
    </div>

    <div class="mb-3">
      <label class="small fw-bold text-muted">Categoría</label>
      <select class="form-select" [(ngModel)]="selectedCategory">
        <option [ngValue]="null">Todas</option>
        @for (cat of categories(); track cat.id) {
          <option [value]="cat.id">{{ cat.name }}</option>
        }
      </select>
    </div>
    <hr>

    <div class="mb-3">
      <label class="small fw-bold text-muted">Precio</label>
      <div class="d-flex justify-content-between small text-dark fw-bold">
        <span>0€</span>
        <span>{{ maxPrice() }}€</span>
      </div>
      <input type="range" class="form-range"
             [min]="0" [max]="absoluteMaxPrice()"
             [(ngModel)]="maxPrice">
    </div>


    <h6 class="small fw-bold text-muted mb-2 text-uppercase">
      <i class="bi bi-filter-right me-1"></i> Preferencias
    </h6>
    <div class="dietary-list mb-4">
      @for (dieta of dietas; track $index) {
        <div class="mb-2">
          <input class="form-check-input "
                 type="checkbox"
                 [(ngModel)]="dieta.ngModel">
          <span class="ms-2 text-dark ">{{ dieta.icon }} {{ dieta.name }}</span>
        </div>
      }
    </div>


      <h6 class="small fw-bold text-muted mb-3 text-uppercase">
        <i class="bi bi-filter-right me-1"></i> Excluir Alérgenos
      </h6>
      <div class="d-flex flex-wrap gap-2 mb-2">
        @for (allergen of allergens(); track allergen.id) {
          <div class="allergen-chip">
            <input type="checkbox"
                   class="btn-check"
                   [id]="'allergen-' + allergen.id"
                   [checked]="selectedAllergens().includes(allergen.id)"
                   (change)="toggleAllergen(allergen.id)"
                   autocomplete="off">

            <label class="btn btn-sm rounded-pill allergen-neon-card"
                   [for]="'allergen-' + allergen.id"
                   [style.color]="selectedAllergens().includes(allergen.id) ? '#fff' : allergen.color"
                   [style.border-color]="allergen.color"
                   [style.background-color]="selectedAllergens().includes(allergen.id) ? allergen.color : 'transparent'">
              {{ allergen.name }}
            </label>
          </div>
        }
      </div>


    <button class="btn btn-sm btn-outline-dark" (click)="reset()">
      Limpiar Filtros
    </button>
  </div>
