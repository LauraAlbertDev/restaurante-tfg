      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-center w-100" id="navbarNav">
      <ul class="navbar-nav">

          <li class="nav-item">
            <a class="nav-link active" aria-current="page" [routerLink]='page.link'>{{ page.name }}</a>

        }
      </ul>
    </div>
  </div>
