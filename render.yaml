services:
  # Base de datos
  - type: pservice
    name: db
    image: mariadb:10.11
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: root_password
      - key: MYSQL_DATABASE
        value: restaurante
    disk:
      name: db-data
      mountPath: /var/lib/mysql
      sizeGB: 1

  # Backend (FastAPI)
  - type: web
    name: api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    context: ./backend
    envVars:
      - key: DATABASE_URL
        value: mysql+mysqlconnector://root:root_password@db:3306/restaurante
    dependsOn:
      - db

  # Frontend (Angular)
  - type: web
    name: frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    context: ./frontend
    dependsOn:
      - api
